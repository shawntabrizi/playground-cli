name: E2E Tests

on:
    push:
        branches: [main]
    pull_request:
    # Daily at 06:00 UTC — catches testnet regressions and Alice h160 depletion
    schedule:
        - cron: "0 6 * * *"
    workflow_dispatch:

jobs:
    e2e:
        name: E2E Tests
        runs-on: ubuntu-latest
        timeout-minutes: 30
        env:
            GITHUB_REPO: ${{ github.repository }}
            FUNDER_LOW_THRESHOLD_DOT: "10"
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install Kubo (IPFS)
              run: |
                  wget -q https://dist.ipfs.tech/kubo/v0.32.1/kubo_v0.32.1_linux-amd64.tar.gz
                  tar xf kubo_v0.32.1_linux-amd64.tar.gz
                  sudo mv kubo/ipfs /usr/local/bin/
                  ipfs init --profile=test
                  ipfs version

            - run: pnpm install

            - name: Run E2E tests
              run: pnpm test:e2e
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TEST_TEMPLATE_DOMAIN: rock-paper-scissors.dot
                  TEST_TEMPLATE_REPO: https://github.com/paritytech/Rock-Paper-Scissors

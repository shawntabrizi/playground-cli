name: Release

on:
    push:
        branches: [main]

permissions:
    contents: write
    pull-requests: write

jobs:
    release:
        runs-on: ${{ github.repository_owner == 'paritytech' && 'parity-default' || 'ubuntu-latest' }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: "1.2.x"
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - run: pnpm install

            # changesets/action has two modes, gated by whether any pending
            # `.changeset/*.md` files exist on the current commit:
            #
            #   1. Pending changesets present → opens / updates a "Version
            #      Packages" PR that bumps versions, regenerates CHANGELOG,
            #      and deletes the consumed changeset files. The PR goes
            #      through the normal protected-branch flow (signed commits,
            #      required status checks, review) — no direct push to main.
            #
            #   2. No pending changesets → invokes the `publish` script,
            #      which is what fires once the Version Packages PR has been
            #      merged. Our publish script tags the release, builds the
            #      four SEA binaries, and creates the GitHub Release.
            #
            # Replaces the previous shell-only flow that committed and
            # `git push`'d directly to main as `github-actions[bot]`. That
            # path was incompatible with branch protection requiring signed
            # commits + PR review (see the failed runs in PRs #120/#121/#122).
            - name: Create version PR or release
              uses: changesets/action@v1
              with:
                  version: pnpm exec changeset version && pnpm format
                  publish: bash scripts/release.sh
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

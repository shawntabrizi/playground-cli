name: Release

# Triggered when a maintainer creates a GitHub Release in the UI (or via
# `gh release create`). Builds the four SEA binaries from the tagged
# commit and attaches them to that Release as assets.
#
# Why no auto-bump-and-push-to-main:
#
# Branch protection on `main` requires verified signatures, required
# status checks, and PRs (no direct pushes). The previous release flow
# pushed a `chore: version packages` commit straight to `main` as
# `github-actions[bot]`, which fails all three rules — the last three
# releases (PRs #120 / #121 / #122) were blocked because of this.
#
# Mirrors the pattern used in `paritytech/bulletin-deploy` exactly:
# version bumps land via a normal human-merged PR, then the maintainer
# creates the Release manually, then THIS workflow attaches binaries.
# No automation ever pushes to `main`. See bulletin-deploy/CLAUDE.md
# §"Release" for the playbook.

on:
    release:
        types: [created]

permissions:
    contents: write # required to upload assets to the release

jobs:
    attach-binaries:
        runs-on: ${{ github.repository_owner == 'paritytech' && 'parity-default' || 'ubuntu-latest' }}
        steps:
            - uses: actions/checkout@v4
              with:
                  # Build from the exact commit the Release tagged, not from
                  # the latest `main`. Protects against a race where someone
                  # merges another PR between tag creation and this run.
                  ref: ${{ github.event.release.tag_name }}

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: "1.2.x"
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - run: pnpm install

            - name: Build SEA binaries
              run: |
                  bun build --compile --target=bun-linux-x64    src/index.ts --outfile dot-linux-x64
                  bun build --compile --target=bun-linux-arm64  src/index.ts --outfile dot-linux-arm64
                  bun build --compile --target=bun-darwin-x64   src/index.ts --outfile dot-darwin-x64
                  bun build --compile --target=bun-darwin-arm64 src/index.ts --outfile dot-darwin-arm64

            - name: Attach binaries to release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAG: ${{ github.event.release.tag_name }}
              run: |
                  # `--clobber` overwrites any existing assets with the same
                  # name — makes the workflow idempotent if it has to be
                  # re-run after a transient build failure.
                  gh release upload "$TAG" \
                      dot-linux-x64 dot-linux-arm64 dot-darwin-x64 dot-darwin-arm64 \
                      --clobber

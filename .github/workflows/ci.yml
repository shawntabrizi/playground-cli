name: CI

on:
    push:
        branches: [main]
    pull_request:
    workflow_dispatch:

jobs:
    format:
        name: Format
        runs-on: parity-default
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: "22"
            - run: pnpm install
            - run: pnpm format:check
